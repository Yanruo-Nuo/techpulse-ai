services:
  # 1. Kafka (KRaft 模式) - 官方镜像在香港秒拉
  kafka:
    image: bitnami/kafka:3.5
    container_name: kafka-kraft
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_KRAFT_CLUSTER_ID=L629Z7UfTty0LTo5f84j8Q
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # JVM 堆内存: KRaft 模式合并 controller+broker，512M 不够
      - KAFKA_HEAP_OPTS=-Xms512M -Xmx1G
      # 日志保留策略: 防止日志堆积耗尽磁盘/内存
      - KAFKA_CFG_LOG_RETENTION_HOURS=24
      - KAFKA_CFG_LOG_RETENTION_BYTES=1073741824
      - KAFKA_CFG_LOG_SEGMENT_BYTES=268435456
      - ALLOW_PLAINTEXT_LISTENER=yes
    # 容器内存限制: 防止 OOM 杀死其他服务
    mem_limit: 2g
    mem_reservation: 1g
    volumes:
      - kafka_data:/bitnami/kafka

  # 2. 实时采集器 (Producer)
  news-crawler:
    build: ./producer
    container_name: tech-crawler
    depends_on:
      - kafka
    restart: always
    expose:
      - "8001"
    environment:
      - PYTHONUNBUFFERED=1

  # 3. Mage AI (Orchestrator)
  magic:
    build:
      context: .
      dockerfile: Dockerfile.mage  # 使用自定义 Dockerfile
    container_name: techpulse-orchestrator
    depends_on:
      - kafka
    command: bash /home/src/start_all.sh
    ports:
      - "6789:6789"
    environment:
      DBT_PROFILES_DIR: "/home/src/techpulse_dbt"
      DBT_PROJECT_DIR: "/home/src/techpulse_dbt"
      USER_CODE_PATH: /home/src/techpulse_intelligence
      ALIBABA_CLOUD_ACCESS_KEY_ID: "${ALIBABA_CLOUD_ACCESS_KEY_ID}"
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: "${ALIBABA_CLOUD_ACCESS_KEY_SECRET}"
      DASHSCOPE_KEY: "${DASHSCOPE_KEY}"
    volumes:
      - .:/home/src
    expose:
      - "8002"
    restart: always

  tech-frontend:
    build:
      context: ./frontend
    container_name: tech-frontend
    command: bash /app/start.sh
    ports:
      - "8501:8501"
    environment:
      - ALIBABA_CLOUD_ACCESS_KEY_ID=${ALIBABA_CLOUD_ACCESS_KEY_ID}
      - ALIBABA_CLOUD_ACCESS_KEY_SECRET=${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
      - MAXCOMPUTE_PROJECT=techpulse_dw
      - MAXCOMPUTE_ENDPOINT=http://service.cn-hongkong.maxcompute.aliyun.com/api
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - ./frontend:/app
    expose:
      - "8003"
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/alerting:/etc/grafana/provisioning/alerting
    restart: always

  # Qdrant 向量数据库 — 替代 Python cosine_similarity O(n) 暴力扫描
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

volumes:
  kafka_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  qdrant_data:
    driver: local
